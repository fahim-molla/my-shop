<!DOCTYPE html>
<html>
<head>
<title>My Shop</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {margin:0;font-family:Arial;background:#f1f3f6;}

header {
  background: linear-gradient(90deg,#ff6a00,#ff3c00);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.cart {
  background:white;
  color:black;
  padding:5px 10px;
  border-radius:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {transform:scale(1.05);}

img {width:100%;height:150px;object-fit:cover;}

.info {padding:10px;text-align:center;}

.price {color:red;font-weight:bold;}

button {
  background:#ff6a00;
  color:white;
  border:none;
  padding:5px 10px;
  margin-top:5px;
}
</style>
</head>

<body>

<header>
  <div>🛒 My Shop</div>
  <div class="cart" onclick="goCart()">Cart (<span id="count">0</span>)</div>
</header>

<div class="grid" id="products"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function load(){
  let html="";
  products.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.image}">
      <div class="info">
        <h4>${p.name}</h4>
        <div class="price">৳${p.price}</div>
        <button onclick="addCart(${p.id})">Add</button>
      </div>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
  document.getElementById("count").innerText=cart.length;
}

function addCart(id){
  let p = products.find(x=>x.id==id);
  cart.push(p);
  localStorage.setItem("cart",JSON.stringify(cart));
  load();
}

function goCart(){
  location.href="cart.html";
}

load();
</script>

</body>
</html>
